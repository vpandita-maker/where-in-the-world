openapi: 3.0.0
info:
  title: Where in the World - Leaderboard API
  version: 1.0.0
  description: REST API for a geography trivia game leaderboard.
servers:
  - url: https://whereintheworld.up.railway.app
    description: Production server
  - url: http://localhost:3000
    description: Local development
paths:
  /add:
    post:
      summary: Add an entry to the leaderboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, score]
              properties:
                username:
                  type: string
                  example: Vansh
                score:
                  type: integer
                  example: 450
                rounds_won:
                  type: integer
                  example: 5
      responses:
        '201':
          description: Entry added successfully
        '400':
          description: Invalid input
  /remove:
    delete:
      summary: Remove an entry from the leaderboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  example: 1
                username:
                  type: string
                  example: Vansh
      responses:
        '200':
          description: Entry removed successfully
        '400':
          description: No id or username provided
        '404':
          description: Entry not found
  /leaderboard:
    get:
      summary: Returns the top 10 leaderboard positions
      responses:
        '200':
          description: Top 10 scores
  /info:
    get:
      summary: Returns quantitative statistics for all entries
      responses:
        '200':
          description: Stats including mean, median, std deviation, quartiles
  /performance:
    get:
      summary: Returns average endpoint execution time in milliseconds
      responses:
        '200':
          description: Performance data per endpoint
  /history:
    get:
      summary: Returns all score submissions with timestamps (bonus endpoint)
      parameters:
        - in: query
          name: username
          schema:
            type: string
          description: Filter by username
        - in: query
          name: date
          schema:
            type: string
          description: Filter by date
      responses:
        '200':
          description: Full history with timestamps